name: Build Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            builder-args: --win nsis portable
            artifact-name: aihot-mate-windows
          - name: macOS Universal
            os: macos-latest
            builder-args: --mac dmg zip --universal
            artifact-name: aihot-mate-macos

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm build

      - name: Package app
        run: pnpm exec electron-builder ${{ matrix.builder-args }} --publish never

      - name: Create macOS updater archive
        if: runner.os == 'macOS'
        run: node scripts/create-mac-update-archive.cjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.app.tar.gz
            release/*.blockmap

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Sign update assets
        env:
          UPDATE_SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_BASE64 }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/sign-release-assets.cjs --version "$VERSION" --tag "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --release-dir artifacts --out-dir artifacts/update

      - name: Verify update assets
        run: node scripts/verify-update-assets.cjs --manifest artifacts/update/latest.json --asset-root artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: AIHOT Mate ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            AIHOT Mate desktop release.

            Assets:
            - Windows installer and portable executable.
            - macOS universal DMG/ZIP for Intel and Apple Silicon Macs.

            The macOS build is unsigned. If macOS blocks it, right-click the app and choose Open, or remove quarantine with:

            ```bash
            xattr -dr com.apple.quarantine "/Applications/AIHOT Mate.app"
            ```

            Updates are verified with AIHOT Mate's built-in Ed25519 update signature before installation.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.app.tar.gz
            artifacts/**/*.blockmap
            artifacts/**/latest.json
            artifacts/**/latest.json.sig
